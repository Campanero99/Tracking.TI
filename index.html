let idiomaActual = localStorage.getItem('marathon_lang') || 'de';

function t(clave) {
  const claves = clave.split('.');
  let valor = TRADUCCIONES[idiomaActual];
  for (const k of claves) {
    if (valor && valor[k] !== undefined) {
      valor = valor[k];
    } else {
      let fallback = TRADUCCIONES['de'];
      for (const fk of claves) {
        if (fallback && fallback[fk] !== undefined) fallback = fallback[fk];
        else return clave;
      }
      return typeof fallback === 'string' ? fallback : clave;
    }
  }
  return typeof valor === 'string' ? valor : clave;
}

function cambiarIdioma(lang) {
  if (TRADUCCIONES[lang]) {
    idiomaActual = lang;
    localStorage.setItem('marathon_lang', lang);
    actualizarIdiomaInterfaz();
  }
}

function actualizarBotonesIdioma() {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.getAttribute('data-lang') === idiomaActual) btn.classList.add('active');
  });
}

const KM=42.195;
let C=JSON.parse(localStorage.getItem('mt_v5_de')||'[]');

function sv(){localStorage.setItem('mt_v5_de',JSON.stringify(C));}
function pad(n){return String(Math.floor(Math.abs(n))).padStart(2,'0');}
function ph(s){
  if(!s)return null;
  const p=s.trim().split(':').map(Number);
  if(p.some(isNaN))return null;
  if(p.length===3)return p[0]*3600+p[1]*60+p[2];
  if(p.length===2)return p[0]*3600+p[1]*60;
  return null;
}
function getMarca(){
  const h=parseInt(document.getElementById('f-marca-h').value)||0;
  const m=parseInt(document.getElementById('f-marca-m').value)||0;
  const s=parseInt(document.getElementById('f-marca-s').value)||0;
  if(h===0&&m===0&&s===0)return'';
  return h+':'+pad(m)+':'+pad(s);
}
function getMarcaSecs(){
  const h=parseInt(document.getElementById('f-marca-h').value)||0;
  const m=parseInt(document.getElementById('f-marca-m').value)||0;
  const s=parseInt(document.getElementById('f-marca-s').value)||0;
  const total=h*3600+m*60+s;
  return total>0?total:null;
}
function setMarca(str){
  if(!str){document.getElementById('f-marca-h').value='';document.getElementById('f-marca-m').value='';document.getElementById('f-marca-s').value='';return;}
  const p=str.split(':').map(Number);
  if(p.length===3){document.getElementById('f-marca-h').value=p[0];document.getElementById('f-marca-m').value=pad(p[1]);document.getElementById('f-marca-s').value=pad(p[2]);}
}
function fh(s){s=Math.round(Math.abs(s));return Math.floor(s/3600)+':'+pad((s%3600)/60)+':'+pad(s%60);}
function fm(s){s=Math.round(Math.abs(s));return Math.floor(s/60)+':'+pad(s%60);}
function t2s(t){if(!t)return 0;const p=t.split(':').map(Number);if(p.length===3)return p[0]*3600+p[1]*60+p[2];if(p.length===2)return p[0]*3600+p[1]*60;return 0;}
function s2t(s){s=((Math.round(s)%86400)+86400)%86400;return pad(s/3600)+':'+pad((s%3600)/60)+':'+pad(s%60);}

}

// ===================== MAPA =====================
function buildMapaCitySelector(){
  const g=document.getElementById('mapa-city-selector');
  g.innerHTML=Object.entries(CIUDADES).map(([name,d])=>
    `<button class="mapa-city-btn" id="mcbtn-${name}" onclick="loadMapaCiudad('${name}')">${d.flag} ${name}</button>`
  ).join('');
  if(ca!==null&&C[ca]&&C[ca].ciudad){
    loadMapaCiudad(C[ca].ciudad);
  }
}

function initMapa(){
  buildMapaCitySelector();
  if(!leafletMap){
    leafletMap=L.map('leaflet-map').setView([48.8584,2.2945],12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap contributors',maxZoom:19
    }).addTo(leafletMap);
    document.getElementById('map-no-city').style.display='flex';
  }
  if(mapCiudadActual){
    setTimeout(()=>leafletMap.invalidateSize(),100);
  }
}

let mapaLayers=[];
function clearMapaLayers(){
  mapaLayers.forEach(l=>leafletMap.removeLayer(l));
  mapaLayers=[];
}

function loadMapaCiudad(name){
  if(!leafletMap)return;
  document.querySelectorAll('.mapa-city-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('mcbtn-'+name);if(btn)btn.classList.add('active');
  mapCiudadActual=name;
  const ciudad=CIUDADES[name];
  document.getElementById('mapa-titulo').textContent='🗺 Marathon von '+name;
  document.getElementById('mapa-subtitulo').textContent='42,195 km · '+ciudad.puntos.length+' markierte Punkte';
  document.getElementById('map-no-city').style.display='none';
  document.getElementById('map-legend').style.display='block';
  clearMapaLayers();

  const poly=L.polyline(ciudad.coords,{color:'#1a6fc4',weight:4,opacity:.85}).addTo(leafletMap);
  mapaLayers.push(poly);

  const kmIcon=(km,isStart,isMeta)=>{
    const bg=isStart?'#1a9e5c':isMeta?'#c0392b':'#1a6fc4';
    const label=isStart?'S':isMeta?'🏁':km;
    return L.divIcon({
      className:'',
      html:`<div style="background:${bg};color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:${isMeta?'12px':'10px'};font-weight:800;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);white-space:nowrap;">${label}</div>`,
      iconSize:[26,26],iconAnchor:[13,13]
    });
  };

  const myIcon=(km)=>{
    return L.divIcon({
      className:'',
      html:`<div style="background:#e8a020;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);">${km}</div>`,
      iconSize:[22,22],iconAnchor:[11,11]
    });
  };

  const calcHoraPrevista=(km)=>{
    const corredor=ca!==null&&C[ca]?C[ca]:null;
    if(!corredor) return null;
    const salida=corredor.salidaPersonal||corredor.salidaOficial;
    if(!salida) return null;
    const ritmoStr=corredor.ritmo;
    if(!ritmoStr) return null;
    const parts=ritmoStr.split(':');
    if(parts.length<2) return null;
    const ritmoSeg=parseInt(parts[0])*60+parseInt(parts[1]);
    const totalSeg=t2s(salida)+Math.round(km*ritmoSeg);
    const h=Math.floor(totalSeg/3600)%24;
    const m=Math.floor((totalSeg%3600)/60);
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  };

  const todosKm=ciudad.puntos;
  const kmFiltrados=todosKm.filter(p=>p.km%5===0||p.km===42.195||p.km===2);

  const toRad=x=>x*Math.PI/180;
  const distM=(a,b)=>{
    const R=6371000,dLat=toRad(b[0]-a[0]),dLon=toRad(b[1]-a[1]);
    const s=Math.sin(dLat/2)**2+Math.cos(toRad(a[0]))*Math.cos(toRad(b[0]))*Math.sin(dLon/2)**2;
    return R*2*Math.asin(Math.sqrt(s));
  };
  const acumDist=[0];
  for(let i=1;i<ciudad.coords.length;i++) acumDist.push(acumDist[i-1]+distM(ciudad.coords[i-1],ciudad.coords[i]));
  const totalDistM=acumDist[acumDist.length-1];
  const idxByKm=(km)=>{
    const target=km*1000*(totalDistM/(42.195*1000));
    let best=0;
    for(let i=1;i<acumDist.length;i++) if(Math.abs(acumDist[i]-target)<Math.abs(acumDist[best]-target)) best=i;
    return best;
  };

  kmFiltrados.forEach(p=>{
    const idx=idxByKm(p.km);
    const lat=ciudad.coords[idx][0];
    const lng=ciudad.coords[idx][1];
    const isStart=p.km<=2;
    const isMeta=p.km>=42;
    const horaPrev=calcHoraPrevista(p.km);
    const kmLabel=isStart?t('mapa.start'):isMeta?t('mapa.goal'):'Km '+p.km;
    const popupHTML=`<div style="font-family:sans-serif;min-width:180px;max-width:240px;">
      <div style="font-weight:800;font-size:.95rem;color:#1a2740;margin-bottom:4px;">📍 ${kmLabel}</div>
      <div style="font-size:.82rem;color:#555;margin-bottom:${horaPrev?'8px':'0'};">${p.calle}</div>
      ${horaPrev?`<div style="background:#eef4ff;border-radius:6px;padding:5px 8px;font-size:.82rem;">⏱ <strong>${t('mapa.estimatedTime')}: ${horaPrev}</strong></div>`:''}
    </div>`;
    const marker=L.marker([lat,lng],{icon:kmIcon(p.km,isStart,isMeta)})
      .bindTooltip(isStart?'🏁 START':(isMeta?'🏁 ZIEL · '+p.calle:'km '+p.km+' · '+p.calle),{permanent:false,direction:'top',offset:[0,-14]})
      .bindPopup(popupHTML,{maxWidth:260,className:'km-popup'})
      .addTo(leafletMap);
    mapaLayers.push(marker);
  });

  if(ca!==null&&C[ca]&&C[ca].ciudad===name){
    const pasosCorredor=C[ca].pasos||[];
    pasosCorredor.forEach(p=>{
      const idx=idxByKm(p.km);
      const lat=ciudad.coords[idx][0];
      const lng=ciudad.coords[idx][1];
      const m2=L.marker([lat,lng],{icon:myIcon(p.km)})
        .bindTooltip('📍 '+p.calle+(p.horaReal?' · ✓ '+p.horaReal:''),{permanent:false,direction:'top',offset:[0,-12]})
        .addTo(leafletMap);
      mapaLayers.push(m2);
    });
  }

  leafletMap.fitBounds(poly.getBounds(),{padding:[30,30]});
  setTimeout(()=>leafletMap.invalidateSize(),150);
}

// ===================== FICHA =====================
function buildCityGrid(){
  const g=document.getElementById('city-grid');
  g.innerHTML=Object.entries(CIUDADES).map(([name,d])=>
    `<div class="city-btn" id="cbtn-${name}" onclick="selCiudad('${name}')">`+
    `<span class="city-flag">${d.flag}</span>${name}</div>`
  ).join('');
  if(ciudadSel){const b=document.getElementById('cbtn-'+ciudadSel);if(b)b.classList.add('sel');}
}

function selCiudad(name){
  ciudadSel=name;
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('sel'));
  const btn=document.getElementById('cbtn-'+name);if(btn)btn.classList.add('sel');
  const fc=document.getElementById('f-carrera');
  if(!fc.value||Object.keys(CIUDADES).some(c=>fc.value.includes(c)))
    fc.value='Marathon von '+name;
  pt=CIUDADES[name].puntos.map(p=>({km:p.km,calle:p.calle}));
  rPF();
}

function rL(){
  const el=document.getElementById('lista-corredores');
  if(!C.length){el.innerHTML='<div style="text-align:center;padding:48px 20px;color:var(--text2);"><div style="font-size:3rem;margin-bottom:12px;">🏃</div><p>'+t('lista.noRunners')+'<br><b>'+t('lista.addRunner')+'</b></p></div>';return;}
  el.innerHTML=C.map((c,i)=>{
    const p=(c.pasos||[]).filter(x=>x.horaReal).length,tt=(c.pasos||[]).length;
    const b=p===0?'<span class="badge badge-yellow">'+t('lista.waiting')+'</span>':
             p>=tt?'<span class="badge badge-green">'+t('lista.finished')+'</span>':
             '<span class="badge badge-red">'+t('lista.running')+' · '+p+'/'+tt+'</span>';
    const flag=c.ciudad&&CIUDADES[c.ciudad]?CIUDADES[c.ciudad].flag+' ':'🏙️ ';
    return '<div class="runner-item">'+
      '<div class="runner-avatar">'+c.nombre.charAt(0).toUpperCase()+'</div>'+
      '<div class="runner-info">'+
        '<div class="runner-name">'+c.nombre+(c.dorsal?' <span style="color:var(--text2);font-size:.8rem;">#'+c.dorsal+'</span>':'')+'</div>'+
        '<div class="runner-sub">'+flag+(c.carrera||'—')+' · '+t('ficha.targetTime')+': '+(c.marca||'—')+' · '+(c.ritmo||'—')+'/km</div>'+
        '<div style="margin-top:5px;">'+b+'</div>'+
      '</div>'+
      '<div class="runner-actions">'+
        '<button class="btn btn-outline btn-sm" onclick="eC('+i+')">✏️ '+t('lista.edit')+'</button>'+
        '<button class="btn btn-primary btn-sm" onclick="aS('+i+')">📍 '+t('lista.follow')+'</button>'+
        '<button class="btn btn-outline btn-sm" onclick="verMapa('+i+')">'+t('lista.route')+'</button>'+
        '<button class="btn btn-danger btn-sm" onclick="bC('+i+')">🗑</button>'+
      '</div></div>';
  }).join('');
}

function verMapa(i){
  ca=i;
  showPage('mapa');
  if(C[i].ciudad){
    setTimeout(()=>loadMapaCiudad(C[i].ciudad),200);
  }
}

function bC(i){if(confirm(t('lista.delete')+' "'+C[i].nombre+'"?')){C.splice(i,1);sv();rL();}}

function nuevoCorreder(){
  ca=null;ciudadSel=null;
  ['f-nombre','f-dorsal','f-carrera','f-ritmo','f-salida-oficial','f-salida-personal'].forEach(id=>document.getElementById(id).value='');
  setMarca('');
  document.getElementById('f-sexo').value='';
  document.getElementById('diferencia-salida').style.display='none';
  document.getElementById('ficha-titulo').textContent=t('ficha.newTitle');
  pt=[];buildCityGrid();rPF();showPage('ficha');
}

function eC(i){
  ca=i;const c=C[i];
  document.getElementById('f-nombre').value=c.nombre||'';
  document.getElementById('f-dorsal').value=c.dorsal||'';
  document.getElementById('f-sexo').value=c.sexo||'';
  document.getElementById('f-carrera').value=c.carrera||'';
  setMarca(c.marca||'');
  document.getElementById('f-ritmo').value=c.ritmo||'';
  document.getElementById('f-salida-oficial').value=c.salidaOficial||'';
  document.getElementById('f-salida-personal').value=c.salidaPersonal||'';
  document.getElementById('diferencia-salida').style.display='none';
  document.getElementById('ficha-titulo').textContent=t('ficha.editTitle')+' - '+c.nombre;
  ciudadSel=c.ciudad||null;
  pt=(c.pasos||[]).map(p=>({km:p.km,calle:p.calle}));
  buildCityGrid();rPF();showPage('ficha');
}

function rPF(){
  pt.sort((a,b)=>(parseFloat(a.km)||0)-(parseFloat(b.km)||0));
  document.getElementById('puntos-container').innerHTML=pt.map((p,i)=>
    '<div class="punto-row">'+
    '<input type="number" placeholder="KM" value="'+p.km+'" step="0.001" onchange="pt['+i+'].km=parseFloat(this.value)||0;ordenarYRenderizar()">'+
    '<input type="text" placeholder="Nombre de calle" value="'+(p.calle||'')+'" oninput="pt['+i+'].calle=this.value">'+
    '<button class="btn btn-danger btn-sm" onclick="rP('+i+')">✕</button>'+
    '</div>'
  ).join('');
}
function ordenarYRenderizar(){pt.sort((a,b)=>(parseFloat(a.km)||0)-(parseFloat(b.km)||0));rPF();}
function addPunto(){pt.push({km:'',calle:''});rPF();}
function rP(i){pt.splice(i,1);rPF();}
function limpiarPuntos(){if(confirm(t('ficha.deleteAll')+'?')){pt=[];rPF();}}

function calcularRitmo(){
  const s=getMarcaSecs();
  document.getElementById('f-ritmo').value=s?fm(s/KM):'';
}
function syncSalida(){
  const p=document.getElementById('f-salida-personal').value;
  const o=document.getElementById('f-salida-oficial').value;
  const el=document.getElementById('diferencia-salida');
  if(!p)return;
  document.getElementById('f-salida-oficial').value=p;
  if(o&&o!==p){
    const d=t2s(p)-t2s(o);
    el.style.display='block';
    el.textContent=Math.abs(d)+'s '+(d>0?'später':'früher')+' — Offizielle Zeit auf Chip-Zeit aktualisiert.';
  }else el.style.display='none';
}

function guardarCorreder(){
  const n=document.getElementById('f-nombre').value.trim();
  if(!n){alert(t('ficha.name'));return;}
  const marca=getMarca(),ms=getMarcaSecs(),rs=ms?ms/KM:null;
  const so=document.getElementById('f-salida-oficial').value;
  const pasos=pt.filter(p=>p.km>0).sort((a,b)=>parseFloat(a.km)-parseFloat(b.km)).map(p=>{
    let hp='';if(rs&&so)hp=s2t(t2s(so)+rs*p.km);
    return{km:parseFloat(p.km),calle:p.calle||'KM '+p.km,horaPrevista:hp,horaReal:'',horaRealSecs:null};
  });
  const corredor={nombre:n,dorsal:document.getElementById('f-dorsal').value,
    sexo:document.getElementById('f-sexo').value,
    carrera:document.getElementById('f-carrera').value.trim(),
    ciudad:ciudadSel,marca,ritmo:rs?fm(rs):'',
    salidaOficial:so,salidaPersonal:document.getElementById('f-salida-personal').value,pasos};
  if(ca!==null){
    const v=C[ca].pasos||[];
    corredor.pasos=corredor.pasos.map(p=>{const x=v.find(y=>y.km===p.km);if(x&&x.horaReal){p.horaReal=x.horaReal;p.horaRealSecs=x.horaRealSecs;}return p;});
    C[ca]=corredor;
  }else{if(C.length>=5){alert('Maximal 5 Läufer');return;}C.push(corredor);}
  sv();showPage('lista');
}

function aS(i){
  ca=i;const c=C[i];
  document.getElementById('seg-nombre').textContent=t('seguimiento.title')+' - '+c.nombre+(c.dorsal?' #'+c.dorsal:'');
  const flag=c.ciudad&&CIUDADES[c.ciudad]?CIUDADES[c.ciudad].flag+' ':'';
  document.getElementById('seg-sub').textContent=flag+(c.carrera||'')+' · Ziel Zeit: '+(c.marca||'—')+' ('+(c.ritmo||'—')+'/km)';
  rS();showPage('seguimiento');
  clearInterval(timerSeg);timerSeg=setInterval(tick,1000);tick();
}

function tick(){
  const c=C[ca],reloj=document.getElementById('seg-reloj'),ahora=new Date();
  if(!c.salidaOficial){reloj.textContent=ahora.toLocaleTimeString();return;}
  const sd=new Date();const[h,m,s]=c.salidaOficial.split(':').map(Number);sd.setHours(h,m,s||0,0);
  const diff=Math.floor((ahora-sd)/1000);
  if(diff<0){reloj.textContent='⏳ Start in '+fh(-diff);return;}
  reloj.textContent='⏱ '+fh(diff);
 
  const pasos=c.pasos||[],conHora=pasos.filter(p=>p.horaRealSecs!=null);
  if(conHora.length>0){
    const u=conHora[conHora.length-1],tc=u.horaRealSecs-t2s(c.salidaOficial);
    if(tc>0&&u.km>0){
      const r=tc/u.km;
      document.getElementById('stat-ra').textContent=fm(r)+'/km';
      document.getElementById('stat-mp').textContent=s2t(t2s(c.salidaOficial)+r*KM);
      document.getElementById('stat-bz').textContent=fh(r*KM);
    }
  }else{
    const ms2=ph(c.marca);
    if(ms2)document.getElementById('stat-mp').textContent=s2t(t2s(c.salidaOficial)+ms2);
    if(ms2)document.getElementById('stat-bz').textContent=fh(ms2);
    document.getElementById('stat-ra').textContent=c.ritmo?c.ritmo+'/km':'—';
  }
}

function rS(){
  const c=C[ca],pasos=c.pasos||[],tbody=document.getElementById('seg-tabla');
  tbody.innerHTML=pasos.map((p,i)=>{
    const ps=!!p.horaReal,nx=!ps&&(i===0||pasos[i-1].horaReal);
    let dh='—';
    if(ps&&p.horaPrevista){
      const d=p.horaRealSecs-t2s(p.horaPrevista);
      if(Math.abs(d)<=10)dh='<span class="badge badge-green">'+t('seguimiento.onTime')+'</span>';
      else if(d>0)dh='<span class="badge badge-red">+'+fm(d)+'</span>';
      else dh='<span class="badge badge-green">-'+fm(-d)+'</span>';
    }
    const rc=ps?'km-passed':(nx?'km-next':'');
    return '<tr class="'+rc+'">'+
      '<td><b>'+p.calle+'</b></td>'+
      '<td>'+(p.km%1===0?p.km:p.km.toFixed(3))+'</td>'+
      '<td style="font-variant-numeric:tabular-nums;">'+(p.horaPrevista||'—')+'</td>'+
      '<td style="font-variant-numeric:tabular-nums;color:'+(ps?'var(--green)':'var(--text2)')+';font-weight:'+(ps?700:400)+';">'+(p.horaReal||'—')+'</td>'+
      '<td>'+dh+'</td>'+
      '<td>'+(ps?'<button class="btn btn-outline btn-sm" onclick="resP('+i+')">'+t('seguimiento.undo')+'</button>':
                '<button class="btn btn-green btn-sm" onclick="regP('+i+')">'+t('seguimiento.here')+'</button>')+
      '</td></tr>';
  }).join('');
  const mp=pasos.find(p=>p.km>=42&&p.horaReal),mc=document.getElementById('seg-meta-card');
  if(mp&&c.salidaOficial){
    const tf=mp.horaRealSecs-t2s(c.salidaOficial);
    mc.style.display='block';document.getElementById('seg-meta-t').textContent=fh(tf);
    const ms3=ph(c.marca);
    if(ms3){
      const d=tf-ms3,el=document.getElementById('seg-meta-d');
      if(Math.abs(d)<=30)el.innerHTML='<span class="badge badge-green">🎯 Zielzeit erreicht! '+c.marca+'</span>';
      else if(d>0)el.innerHTML='<span class="badge badge-red">+'+fh(d)+' über Zielzeit</span>';
      else el.innerHTML='<span class="badge badge-green">🎉 '+fh(-d)+' unter Zielzeit</span>';
    }
  }else mc.style.display='none';
}

function regP(i){
  const a=new Date(),c=C[ca];
  c.pasos[i].horaReal=a.toTimeString().substring(0,8);
  c.pasos[i].horaRealSecs=a.getHours()*3600+a.getMinutes()*60+a.getSeconds();
  sv();rS();
}
function resP(i){
  const c=C[ca];
  for(let j=i;j<c.pasos.length;j++){c.pasos[j].horaReal='';c.pasos[j].horaRealSecs=null;}
  sv();rS();
}

function rPS(){
  const s=document.getElementById('prono-corredor');
  s.innerHTML='<option value="">'+t('prognosis.noRunner')+'</option>'+
    C.map((c,i)=>'<option value="'+i+'">'+c.nombre+(c.dorsal?' #'+c.dorsal:'')+(c.carrera?' — '+c.carrera:'')+'</option>').join('');
}
function autoRellenarProno(){
  const i=document.getElementById('prono-corredor').value;
  if(i===''){calcProno();return;}
  const c=C[i],ch=(c.pasos||[]).filter(p=>p.horaRealSecs!=null);
  if(ch.length&&c.salidaOficial){
    const u=ch[ch.length-1],tc=u.horaRealSecs-t2s(c.salidaOficial);
    document.getElementById('prono-km').value=u.km;
    const _hv=Math.floor(tc/3600);document.getElementById('prono-th').value=_hv;document.getElementById('prono-tm2').value=('0'+Math.floor((tc%3600)/60)).slice(-2);document.getElementById('prono-ts').value=('0'+Math.round(tc%60)).slice(-2);
  }
  calcProno();
}
function calcProno(){
  const km=parseFloat(document.getElementById('prono-km').value);
  const _th=parseInt(document.getElementById('prono-th').value)||0,_tm=parseInt(document.getElementById('prono-tm2').value)||0,_ts2=parseInt(document.getElementById('prono-ts').value)||0;const ts=_th*3600+_tm*60+_ts2;
  const dist=parseFloat(document.getElementById('prono-dist').value)||KM;
  const el=document.getElementById('prono-res');
  if(!km||!ts||km<=0||km>dist||ts<=0){el.style.display='none';return;}
  const r=ts/km,tot=r*dist,res=dist-km;
  const _tot=Math.round(Math.abs(tot));document.getElementById('prono-tm-h').textContent=Math.floor(_tot/3600);document.getElementById('prono-tm-m').textContent=('0'+Math.floor((_tot%3600)/60)).slice(-2);document.getElementById('prono-tm-s').textContent=('0'+(_tot%60)).slice(-2);
  document.getElementById('prono-rm').textContent=fm(r)+'/km';
  document.getElementById('prono-kr').textContent=res.toFixed(2)+' km';
  const idx=document.getElementById('prono-corredor').value;
  let hl='—';
  if(idx!==''){const c=C[idx];if(c.salidaOficial)hl=s2t(t2s(c.salidaOficial)+tot);}
  else{const now=new Date();const nowS=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();hl=s2t(nowS+tot);}
  document.getElementById('prono-hl').textContent=hl;
  const vs=document.getElementById('prono-vs');
  if(idx!==''){
    const c=C[idx],ms4=ph(c.marca);
    if(ms4){
      vs.style.display='block';
      const d=tot-ms4,e=document.getElementById('prono-vs-t');
      if(Math.abs(d)<=30)e.innerHTML='<span class="badge badge-green">🎯 Zielzeit erreicht! '+fh(tot)+' vs '+c.marca+'</span>';
      else if(d>0)e.innerHTML='<span class="badge badge-red">+'+fh(d)+' über Zielzeit ('+c.marca+')</span>';
      else e.innerHTML='<span class="badge badge-green">🔥 '+fh(-d)+' unter Zielzeit ('+c.marca+')</span>';
    }else vs.style.display='none';
  }else vs.style.display='none';
  el.style.display='block';
}

// ===================== LICENCIA =====================
var _SEC="MaratonTrack2025_XK9";
async function _sha256(m){var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0");}).join("");}
function _b64d(s){try{return decodeURIComponent(escape(atob(s)));}catch(e){return null;}}
function _fd(s){return s.slice(6,8)+"/"+s.slice(4,6)+"/"+s.slice(0,4);}
async function checkLicense(){
  var raw=document.getElementById("lic-input").value.trim();
  var err=document.getElementById("lic-err");
  var ok=document.getElementById("lic-ok");
  err.textContent="";ok.style.display="none";
  try{
    var b64=raw.replace(/-/g,"").replace(/ /g,"");
    var full=_b64d(b64);
    if(!full)throw "invalid";
    var parts=full.split("|");
    if(parts.length!==3)throw "invalid";
    var empresa=parts[0],expiry=parts[1],check=parts[2];
    var hash=await _sha256(empresa+"|"+expiry+_SEC);
    if(hash.substring(0,8).toUpperCase()!==check)throw "tampered";
    var exp=new Date(expiry.slice(0,4),expiry.slice(4,6)-1,expiry.slice(6,8));
    var today=new Date();today.setHours(0,0,0,0);
    var daysLeft=Math.ceil((exp-today)/86400000);
    if(daysLeft<0)throw "expired";
    sessionStorage.setItem("mt_lic_ok","1");
    sessionStorage.setItem("mt_lic_empresa",empresa);
    sessionStorage.setItem("mt_lic_expiry",_fd(expiry));
    sessionStorage.setItem("mt_lic_days",daysLeft);
    ok.innerHTML=t('license.welcome')+", <b>"+empresa+"</b><br>"+t('license.validUntil')+": "+_fd(expiry)+" &middot; <b>"+daysLeft+" "+t('license.daysLeft')+"</b>";
    ok.style.display="block";
    setTimeout(function(){document.getElementById("license-screen").style.display="none";},1800);
  }catch(e){
    if(String(e)==="expired"){err.textContent=t('license.expired');}
    else if(String(e)==="tampered"){err.textContent=t('license.tampered');}
    else{err.textContent=t('license.invalidCode');}
    var inp=document.getElementById("lic-input");inp.style.borderColor="#c0392b";
    setTimeout(function(){inp.style.borderColor="#c8d8ee";},2000);
  }
}
